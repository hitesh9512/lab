name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Debug current directory
        run: |
          echo "Current directory:"
          pwd
          echo "Files in repo:"
          ls -R

      - name: Run script
        run: python hello.py
